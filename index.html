<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title-tag">FNF Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0a0a0f;
            --card-bg: rgba(26, 26, 46, 0.7);
            --accent-color: #00f5d4;
            --accent-tv: #ff2a6d;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --font-heading: 'Share Tech Mono', monospace;
            --font-body: 'IBM Plex Sans', sans-serif;
            --glass-border: rgba(0, 245, 212, 0.1);
            --glass-hover: rgba(0, 245, 212, 0.4);
            --danger-color: #ef4444;
            --success-color: #10b981;
            --offline-color: #ef4444;
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.8);
            --accent-color: #0ea5e9;
            --accent-tv: #e11d48;
            --text-color: #0f172a;
            --text-muted: #64748b;
            --glass-border: rgba(14, 165, 233, 0.2);
            --glass-hover: rgba(14, 165, 233, 0.5);
            --success-color: #059669;
            --offline-color: #dc2626;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        h1, h2, h3, h4 {
            font-family: var(--font-heading);
            letter-spacing: 1px;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            transition: 0.3s;
        }

        /* Glassmorphism */
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* Header */
        header {
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 10;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        #notice-banner {
            background: rgba(0, 245, 212, 0.1);
            color: var(--accent-color);
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            margin: 0 auto 1rem;
            font-weight: 600;
            display: none;
            border: 1px solid var(--glass-border);
            max-width: fit-content;
        }

        /* Splash Screen */
        .welcome-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-color);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease-in-out, visibility 1s;
        }
        
        .welcome-text {
            font-family: var(--font-heading);
            font-size: clamp(2.5rem, 8vw, 6rem);
            color: var(--accent-color);
            text-shadow: 0 0 30px var(--accent-color);
            text-align: center;
            padding: 2rem;
            opacity: 0;
            transform: scale(0.8);
            animation: splash-in 2.5s ease-out forwards;
        }

        @keyframes splash-in {
            0% { opacity: 0; transform: scale(0.8); }
            30% { opacity: 1; transform: scale(1.05); }
            70% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.1); }
        }

        .welcome-overlay.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Fallback: ensure splash screen fades out even if JS fails */
        @keyframes overlay-fade {
            0% { opacity: 1; visibility: visible; }
            80% { opacity: 1; visibility: visible; }
            100% { opacity: 0; visibility: hidden; }
        }
        .welcome-overlay {
            animation: overlay-fade 4s forwards;
        }

        /* Glitch Effect */
        .glitch {
            position: relative;
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--text-color);
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--accent-color);
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }

        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 var(--danger-color);
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 var(--accent-color);
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim 2.5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(10px, 9999px, 86px, 0); }
            20% { clip: rect(65px, 9999px, 12px, 0); }
            40% { clip: rect(23px, 9999px, 110px, 0); }
            60% { clip: rect(87px, 9999px, 4px, 0); }
            80% { clip: rect(110px, 9999px, 55px, 0); }
            100% { clip: rect(3px, 9999px, 20px, 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            20% { clip: rect(3px, 9999px, 80px, 0); }
            40% { clip: rect(110px, 9999px, 20px, 0); }
            60% { clip: rect(14px, 9999px, 86px, 0); }
            80% { clip: rect(98px, 9999px, 12px, 0); }
            100% { clip: rect(44px, 9999px, 76px, 0); }
        }

        .tagline {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }

        @media (min-width: 768px) {
            .controls {
                flex-direction: row;
                justify-content: space-between;
            }
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            max-width: 400px;
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            border-radius: 8px;
            font-family: var(--font-body);
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-color);
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.25rem;
            border-radius: 8px;
            display: none; /* hidden on mobile, shown on desktop */
        }

        @media (min-width: 768px) {
            .tabs { display: flex; }
        }

        .tab {
            padding: 0.5rem 1.5rem;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 6px;
            font-family: var(--font-heading);
            transition: all 0.3s;
            font-size: 1rem;
        }

        .tab:hover {
            color: var(--text-color);
        }

        .tab.active {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 10px var(--accent-color);
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 2rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            position: relative;
            z-index: 10;
            padding-bottom: 6rem; /* space for bottom nav */
        }

        section {
            margin-bottom: 3rem;
            animation: fadeIn 0.5s ease-out;
        }

        .section-title {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.5rem;
            display: inline-block;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        /* Cards */
        .card {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: var(--accent-color);
        }

        .card.tv-card::before {
            background: var(--accent-tv);
        }
        
        .card.tv-card {
            border-color: rgba(255, 42, 109, 0.2);
        }
        .card.tv-card:hover {
            border-color: rgba(255, 42, 109, 0.6);
            box-shadow: 0 8px 15px rgba(255, 42, 109, 0.2);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 245, 212, 0.2);
            border-color: var(--glass-hover);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-title-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex: 1;
            min-width: 0;
        }

        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .card-title {
            font-size: 1.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-color);
        }

        .card-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.5rem;
        }

        .badge {
            font-size: 0.7rem;
            padding: 0.25rem 0.5rem;
            border-radius: 12px;
            text-transform: uppercase;
            font-weight: bold;
            font-family: var(--font-heading);
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }

        .badge::before {
            content: '';
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
        }

        .badge.online {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .badge.online::before { background-color: var(--success-color); box-shadow: 0 0 5px var(--success-color); }

        .badge.offline {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--offline-color);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .badge.offline::before { background-color: var(--offline-color); }

        .badge.checking {
            background-color: rgba(148, 163, 184, 0.1);
            color: var(--text-muted);
            border: 1px solid rgba(148, 163, 184, 0.3);
        }
        .badge.checking::before { background-color: var(--text-muted); animation: blink 1s infinite; }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: auto;
            align-items: center;
        }

        .stats-fav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .fav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.25rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .fav-btn.active {
            color: #fbbf24;
            text-shadow: 0 0 8px rgba(251, 191, 36, 0.5);
        }
        .fav-btn:hover {
            transform: scale(1.1);
        }

        /* Buttons */
        .btn {
            padding: 0.6rem 1rem;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: var(--text-color);
            cursor: pointer;
            border-radius: 6px;
            font-family: var(--font-body);
            transition: all 0.3s;
            text-align: center;
            flex: 1;
            font-weight: 600;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn.primary {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background: rgba(0, 245, 212, 0.1);
        }

        .btn.primary:hover {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 245, 212, 0.4);
        }
        
        .tv-card .btn.primary {
            border-color: var(--accent-tv);
            color: var(--accent-tv);
            background: rgba(255, 42, 109, 0.1);
        }
        .tv-card .btn.primary:hover {
            background: var(--accent-tv);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 42, 109, 0.4);
        }

        /* Skeleton Animation */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-card {
            height: 160px;
        }

        /* Bottom Nav (Mobile) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            padding: 0.5rem 0;
            z-index: 100;
            padding-bottom: calc(0.5rem + env(safe-area-inset-bottom));
        }

        @media (min-width: 768px) {
            .bottom-nav { display: none; }
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            gap: 0.25rem;
            cursor: pointer;
            padding: 0.5rem;
            font-family: var(--font-body);
            transition: 0.3s;
        }

        .nav-item i {
            font-size: 1.25rem;
            font-style: normal;
        }

        .nav-item.active {
            color: var(--accent-color);
        }
        .nav-item.active i {
            text-shadow: 0 0 8px var(--accent-color);
        }

        /* Footer */
        footer {
            padding: 1.5rem;
            border-top: 1px solid var(--glass-border);
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
            margin-top: auto;
            position: relative;
            z-index: 10;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .branding-text {
            color: var(--text-muted);
            font-family: var(--font-heading);
        }

        #admin-trigger {
            background: transparent;
            border: none;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.3s, transform 0.3s;
            font-size: 1.2rem;
        }
        #admin-trigger:hover { opacity: 1; transform: scale(1.1); }

        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--accent-color); color: #000; padding: 0.75rem 1.5rem; border-radius: 4px; font-family: var(--font-heading); font-weight: bold; opacity: 0; transition: all 0.3s; z-index: 2000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>
    <div id="welcome-overlay" class="welcome-overlay">
        <div class="welcome-text" id="splash-welcome-text">Welcome to FNF Online FTP Portal</div>
    </div>

    <canvas id="particles-js"></canvas>

    <header>
        <div class="header-container">
            <div id="notice-banner"></div>
            <h1 class="glitch" data-text="FNF Online" id="site-title">FNF Online</h1>
            <p class="tagline">Explore the Network</p>
            <div class="controls">
                <input type="text" id="search-input" placeholder="Search servers and channels...">
                <div class="tabs">
                    <button class="tab active" data-tab="all">All</button>
                    <button class="tab" data-tab="ftp">FTP Servers</button>
                    <button class="tab" data-tab="tv">Live TV</button>
                    <button class="tab" data-tab="fav">Favorites</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <section id="ftp-section">
            <h2 class="section-title">FTP Servers</h2>
            <div class="grid" id="ftp-grid"></div>
        </section>

        <section id="tv-section">
            <h2 class="section-title">Live TV</h2>
            <div class="grid" id="tv-grid"></div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" data-tab="all">
            <i>🌐</i><span>All</span>
        </button>
        <button class="nav-item" data-tab="ftp">
            <i>📁</i><span>FTP</span>
        </button>
        <button class="nav-item" data-tab="tv">
            <i>📺</i><span>Live TV</span>
        </button>
        <button class="nav-item" data-tab="fav">
            <i>⭐</i><span>Favs</span>
        </button>
    </nav>

    <footer>
        <div class="footer-content">
            <span class="branding-text" id="footer-branding">© 2024 FNF Online</span>
            <a href="admin.html" id="admin-trigger-link" title="Admin Control Center">🔒</a>
        </div>
    </footer>

    <div id="toast">Copied to clipboard!</div>

    <script>
        // --- SUPABASE CONFIG ---
        const SB_URL = "https://smjxhkelvexefmnwdwdx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtanhoa2VsdmV4ZWZtbndkd2R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTA4NzksImV4cCI6MjA5NDI2Njg3OX0.6wplAUcTRMu5XimCjb3EhkYpatgkOvkiAqN6F9pwbfc";
        const supabase = window.supabase ? window.createClient(SB_URL, SB_KEY) : null;

        async function logVisitor() {
            if (!supabase) return;
            try {
                // Fetch IP/ISP info
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                // Log to Supabase
                const { error } = await supabase
                    .from('visitor_logs')
                    .insert([{ 
                        ip: data.ip, 
                        isp: data.org, 
                        city: data.city, 
                        country: data.country_name,
                        user_agent: navigator.userAgent
                    }]);
                
                if (error) console.error('Log error:', error);
            } catch (err) {
                console.error('Visitor logging failed:', err);
            }
        }

        // --- PWA SETUP ---
        const manifest = {
            "name": "FNF Online",
            "short_name": "FNF",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#0a0a0f",
            "theme_color": "#0a0a0f",
            "icons": [{
                "src": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxOTIiIGhlaWdodD0iMTkyIiB2aWV3Qm94PSIwIDAgMTkyIDE5MiI+PHJlY3Qgd2lkdGg9IjE5MiIgaGVpZ2h0PSIxOTIiIGZpbGw9IiMwYTBhMGYiLz48dGV4dCB4PSI1MCUiIHk9IjUwJSIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iNjAiIGZpbGw9IiMwMGY1ZDQiIGRvbWluYW50LWJhc2VsaW5lPSJtaWRkbGUiIHRleHQtYW5jaG9yPSJtaWRkbGUiPkZORjwvdGV4dD48L3N2Zz4=",
                "sizes": "192x192",
                "type": "image/svg+xml"
            }]
        };
        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        document.querySelector("head").insertAdjacentHTML('beforeend', `<link rel="manifest" href="${URL.createObjectURL(manifestBlob)}">`);
        
        const swCode = `self.addEventListener('install', e => self.skipWaiting()); self.addEventListener('activate', e => self.clients.claim()); self.addEventListener('fetch', e => {});`;
        const swBlob = new Blob([swCode], {type: 'text/javascript'});
        if ('serviceWorker' in navigator) navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});

        // --- BACKGROUND PARTICLES ---
        const canvas = document.getElementById('particles-js');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        
        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particlesArray = [];
            let numParticles = (canvas.width * canvas.height) / 15000;
            for(let i=0; i<numParticles; i++){
                particlesArray.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: (Math.random() - 0.5) * 0.5
                });
            }
        }
        function animateParticles() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = 'rgba(0, 245, 212, 0.5)';
            if(document.documentElement.getAttribute('data-theme') === 'light') ctx.fillStyle = 'rgba(14, 165, 233, 0.5)';
            particlesArray.forEach(p => {
                p.x += p.speedX; p.y += p.speedY;
                if(p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                if(p.y < 0 || p.y > canvas.height) p.speedY *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }
        window.addEventListener('resize', initParticles);
        initParticles();
        animateParticles();

        // --- DATA & STATE ---
        const DEFAULT_FTP_SERVERS = [
            { id: 'f1', name: 'FTP 1', url: 'https://discoveryftp.net/', active: true, clicks: 0, favorite: false, icon: '' },
            { id: 'f2', name: 'FTP 2', url: 'http://zflixbd.com/', active: true, clicks: 0, favorite: false, icon: '' },
            { id: 'f3', name: 'FTP 3', url: 'http://10.10.10.3/', active: true, clicks: 0, favorite: false, icon: '' },
            { id: 'f4', name: 'FTP 4', url: 'http://172.27.27.84/', active: true, clicks: 0, favorite: false, icon: '' },
            { id: 'f5', name: 'FTP 5', url: 'http://172.16.50.4/', active: true, clicks: 0, favorite: false, icon: '' },
            { id: 'f6', name: 'FTP 6', url: 'http://10.16.100.244/dashboard.php?session=6de774324c1d97f78accc07fe13726a1219334d3b950e8953bbf5bf6ec7964a8', active: true, clicks: 0, favorite: false, icon: '' },
            { id: 'f7', name: 'FTP 7', url: 'http://10.20.30.40/', active: true, clicks: 0, favorite: false, icon: '' },
            { id: 'f8', name: 'FTP 8', url: 'http://10.1.1.1/', active: true, clicks: 0, favorite: false, icon: '' },
            { id: 'f9', name: 'FTP 9', url: 'http://10.99.99.99/', active: true, clicks: 0, favorite: false, icon: '' },
            { id: 'f10', name: 'FTP 10', url: 'http://redforce.live/', active: true, clicks: 0, favorite: false, icon: '' }
        ];
        const DEFAULT_TV_CHANNELS = [
            { id: 't1', name: 'Live TV 1', url: 'http://10.10.10.2/', active: true, clicks: 0, favorite: false, icon: '' },
            { id: 't2', name: 'Live TV 2', url: 'http://tv.ksbnet.net:8099/?channel=t-sports', active: true, clicks: 0, favorite: false, icon: '' },
            { id: 't3', name: 'Live TV 3', url: 'http://10.99.99.99/', active: true, clicks: 0, favorite: false, icon: '' },
            { id: 't4', name: 'Live TV 4', url: 'http://redforce.live/', active: true, clicks: 0, favorite: false, icon: '' }
        ];
        
        const DEFAULT_SETTINGS = { title: "FNF Online", theme: "dark", notice: "Welcome to FNF Online FTP Portal" };

        let state = { ftp: [], tv: [], settings: {} };
        let statusCache = {}; // { id: 'online'|'offline'|'checking' }

        function loadData() {
            const storedState = localStorage.getItem('fnfOnlineState');
            let hasChanges = false;

            if (storedState) {
                try {
                    state = JSON.parse(storedState);
                    if (!state.settings) { state.settings = { ...DEFAULT_SETTINGS }; hasChanges = true; }
                    
                    // Merge logic: Keep stored clicks/favs but allow code updates to names/urls
                    const mergeItems = (currentList, defaultList) => {
                        defaultList.forEach(def => {
                            const existing = currentList.find(i => i.id === def.id);
                            if (existing) {
                                // Update name/url if changed in code, but keep clicks/favs
                                if (existing.url !== def.url || existing.name !== def.name) {
                                    existing.url = def.url;
                                    existing.name = def.name;
                                    hasChanges = true;
                                }
                            } else {
                                // Add new default items if they don't exist
                                currentList.push({ ...def });
                                hasChanges = true;
                            }
                        });
                    };

                    mergeItems(state.ftp, DEFAULT_FTP_SERVERS);
                    mergeItems(state.tv, DEFAULT_TV_CHANNELS);

                    if (hasChanges) saveData();
                } catch (e) { initDefaults(); }
            } else { initDefaults(); }
            
            applySettings();
            renderApp();
            
            // Start background status checks
            [...state.ftp, ...state.tv].forEach(item => {
                if (item.active) checkStatus(item);
            });
        }

        function initDefaults() {
            state = {
                ftp: JSON.parse(JSON.stringify(DEFAULT_FTP_SERVERS)),
                tv: JSON.parse(JSON.stringify(DEFAULT_TV_CHANNELS)),
                settings: JSON.parse(JSON.stringify(DEFAULT_SETTINGS))
            };
            saveData();
        }

        function saveData() { 
            localStorage.setItem('fnfOnlineState', JSON.stringify(state)); 
        }

        // --- PING FEATURE ---
        async function checkStatus(item) {
            if(statusCache[item.id] && statusCache[item.id] !== 'checking') return statusCache[item.id];
            
            statusCache[item.id] = 'checking';
            updateCardStatusUI(item.id, 'checking');

            // Handle Mixed Content: HTTPS sites cannot fetch HTTP resources
            const isHttpsSite = window.location.protocol === 'https:';
            const isTargetHttp = item.url.startsWith('http:');

            if (isHttpsSite && isTargetHttp) {
                // Cannot reliably check HTTP status from HTTPS site due to browser security
                statusCache[item.id] = 'ready'; 
                updateCardStatusUI(item.id, 'ready');
                return 'ready';
            }

            const isReachable = await new Promise((resolve) => {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => {
                    controller.abort();
                    resolve(false);
                }, 3500);

                fetch(item.url, { mode: 'no-cors', signal: controller.signal, cache: 'no-store' })
                    .then(() => {
                        clearTimeout(timeoutId);
                        resolve(true);
                    })
                    .catch(() => {
                        const img = new Image();
                        img.onload = () => { clearTimeout(timeoutId); resolve(true); };
                        img.onerror = () => { clearTimeout(timeoutId); resolve(false); };
                        img.src = `${item.url}/favicon.ico?t=${Date.now()}`;
                    });
            });

            statusCache[item.id] = isReachable ? 'online' : 'offline';
            updateCardStatusUI(item.id, statusCache[item.id]);
            return statusCache[item.id];
        }

        function updateCardStatusUI(id, status) {
            const el = document.getElementById(`status-${id}`);
            const card = el ? el.closest('.card') : null;
            if(el) {
                el.className = `badge ${status}`;
                
                if (status === 'ready' || status === 'online') {
                    el.textContent = 'Online';
                    el.className = 'badge online';
                    el.style = ''; // Reset custom styles
                } else {
                    el.textContent = status.charAt(0).toUpperCase() + status.slice(1);
                }
                
                if (card) {
                    if (status === 'offline') {
                        card.style.opacity = '0.7';
                        const btn = card.querySelector('.btn');
                        if (btn) {
                            btn.textContent = 'Server Offline';
                            btn.style.borderColor = 'var(--danger-color)';
                            btn.style.color = 'var(--danger-color)';
                            btn.style.background = 'rgba(239, 68, 68, 0.1)';
                        }
                    } else {
                        card.style.opacity = '1';
                        const btn = card.querySelector('.btn');
                        if (btn) {
                            btn.textContent = 'Open Server';
                            btn.style = ''; 
                        }
                    }
                }
            }
        }

        // --- RENDER FRONTEND ---
        function applySettings() {
            const siteTitle = document.getElementById('site-title');
            if (siteTitle) {
                siteTitle.textContent = state.settings.title;
                siteTitle.setAttribute('data-text', state.settings.title);
            }
            const siteTitleTag = document.getElementById('site-title-tag');
            if (siteTitleTag) siteTitleTag.textContent = state.settings.title;
            
            const footerBranding = document.getElementById('footer-branding');
            if (footerBranding) footerBranding.textContent = `© ${new Date().getFullYear()} ` + state.settings.title;
            
            const settingSiteTitle = document.getElementById('setting-site-title');
            if (settingSiteTitle) settingSiteTitle.value = state.settings.title;
            
            const noticeEl = document.getElementById('notice-banner');
            const splashText = document.getElementById('splash-welcome-text');
            
            if(state.settings.notice) {
                if (noticeEl) {
                    noticeEl.textContent = state.settings.notice;
                    noticeEl.style.display = 'block';
                }
                if (splashText) splashText.textContent = state.settings.notice;
            } else {
                if (noticeEl) noticeEl.style.display = 'none';
            }
            
            const settingNotice = document.getElementById('setting-notice');
            if (settingNotice) settingNotice.value = state.settings.notice || '';

            // Handle splash screen
            setTimeout(() => {
                const overlay = document.getElementById('welcome-overlay');
                if (overlay) overlay.classList.add('fade-out');
            }, 2500);

            const themeToggle = document.getElementById('theme-toggle');
            if (state.settings.theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
                if (themeToggle) themeToggle.textContent = 'Switch to Dark Mode';
            } else {
                document.documentElement.removeAttribute('data-theme');
                if (themeToggle) themeToggle.textContent = 'Switch to Light Mode';
            }
        }

        function getIconHtml(item, type) {
            if(item.icon) return `<img src="${item.icon}" class="card-icon">`;
            const em = type === 'tv' ? '📺' : '📁';
            return `<div class="card-icon">${em}</div>`;
        }

        window.toggleFav = function(id) {
            const item = [...state.ftp, ...state.tv].find(i => i.id === id);
            if(item) {
                item.favorite = !item.favorite;
                saveData();
                renderApp();
            }
        }

        window.trackClick = function(id, url) {
            const item = [...state.ftp, ...state.tv].find(i => i.id === id);
            if(item) {
                item.clicks++;
                saveData();
                renderApp(); // small re-render overhead but ok for local
            }
            window.open(url, '_blank');
        };

        function renderApp() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const activeTab = document.querySelector('.tab.active') ? document.querySelector('.tab.active').getAttribute('data-tab') : 'all';

            const ftpSection = document.getElementById('ftp-section');
            const tvSection = document.getElementById('tv-section');
            const ftpGrid = document.getElementById('ftp-grid');
            const tvGrid = document.getElementById('tv-grid');

            if (!ftpGrid || !tvGrid) return; // Safety check

            ftpGrid.innerHTML = ''; tvGrid.innerHTML = '';

            let filteredFTP = (state.ftp || []).filter(i => i.active && i.name.toLowerCase().includes(searchTerm));
            let filteredTV = (state.tv || []).filter(i => i.active && i.name.toLowerCase().includes(searchTerm));

            if(activeTab === 'fav') {
                filteredFTP = filteredFTP.filter(i => i.favorite);
                filteredTV = filteredTV.filter(i => i.favorite);
                if (ftpSection) ftpSection.style.display = filteredFTP.length ? 'block' : 'none';
                if (tvSection) tvSection.style.display = filteredTV.length ? 'block' : 'none';
                if(!filteredFTP.length && !filteredTV.length) {
                    if (ftpSection) ftpSection.style.display = 'block';
                    ftpGrid.innerHTML = '<p style="color: var(--text-muted)">No favorites added yet.</p>';
                }
            } else {
                if (ftpSection) ftpSection.style.display = (activeTab === 'all' || activeTab === 'ftp') ? 'block' : 'none';
                if (tvSection) tvSection.style.display = (activeTab === 'all' || activeTab === 'tv') ? 'block' : 'none';
            }

            const buildCard = (item, type) => {
                const status = statusCache[item.id] || 'checking';
                const tvClass = type === 'tv' ? 'tv-card' : '';
                return `
                    <div class="card glass ${tvClass}">
                        <div class="card-header">
                            <div class="card-title-group">
                                ${getIconHtml(item, type)}
                                <div>
                                    <h3 class="card-title" title="${item.name}">${item.name}</h3>
                                    <div class="stats-fav">
                                        <span>👁️ ${item.clicks || 0} visits</span>
                                    </div>
                                </div>
                            </div>
                            <div class="card-meta">
                                <button class="fav-btn ${item.favorite?'active':''}" onclick="toggleFav('${item.id}')">★</button>
                                <span id="status-${item.id}" class="badge ${status}">${status.charAt(0).toUpperCase() + status.slice(1)}</span>
                            </div>
                        </div>
                        <div class="card-actions">
                            <button onclick="trackClick('${item.id}', '${item.url}')" class="btn primary">Open Server</button>
                        </div>
                    </div>
                `;
            };

            if (!filteredFTP.length && activeTab !== 'fav') ftpGrid.innerHTML = '<p style="color: var(--text-muted)">No FTP servers.</p>';
            else filteredFTP.forEach(item => ftpGrid.insertAdjacentHTML('beforeend', buildCard(item, 'ftp')));

            if (!filteredTV.length && activeTab !== 'fav') tvGrid.innerHTML = '<p style="color: var(--text-muted)">No Live TV channels.</p>';
            else filteredTV.forEach(item => tvGrid.insertAdjacentHTML('beforeend', buildCard(item, 'tv')));
        }

        function handleTabClick(tabVal) {
            document.querySelectorAll('.tab, .nav-item').forEach(t => t.classList.remove('active'));
            document.querySelectorAll(`[data-tab="${tabVal}"]`).forEach(t => t.classList.add('active'));
            renderApp();
        }

        document.getElementById('search-input').addEventListener('input', () => renderApp());
        document.querySelectorAll('.tab, .nav-item').forEach(tab => {
            tab.addEventListener('click', (e) => handleTabClick(e.currentTarget.getAttribute('data-tab')));
        });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg; toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Keyboard Shortcut to Admin
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && (e.key === 'A' || e.key === 'a')) {
                e.preventDefault(); window.location.href = 'admin.html';
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            loadData();
            logVisitor();
        });
    </script>
</body>
